version: '3'

# ── Build options ──────────────────────────────────────────────────────────────
#
# OPTION A — Container (only requires Podman or Docker)
#   task container:publish:mlm    Full MLM build — HTML + API PDF
#   task container:publish:uyuni  Full Uyuni build — HTML + API PDF
#   task container:pdf:mlm        MLM API PDF only
#   task container:pdf:uyuni      Uyuni API PDF only
#   task container:draft:mlm      MLM HTML preview (no PDF)
#   task container:draft:uyuni    Uyuni HTML preview (no PDF)
#   task container:obs:mlm        OBS tarballs for MLM
#   task container:obs:uyuni      OBS tarballs for Uyuni
#
# OPTION B — Local toolchain (Go + Task + Antora + Asciidoctor-PDF installed)
#   task publish:mlm              Full MLM build — HTML + API PDF
#   task publish:uyuni            Full Uyuni build — HTML + API PDF
#   task pdf:mlm                  MLM API PDF only
#   task pdf:uyuni                Uyuni API PDF only
#   task draft:mlm                MLM HTML preview (no PDF)
#   task draft:uyuni              Uyuni HTML preview (no PDF)
#   task obs:mlm                  OBS tarballs for MLM
#   task obs:uyuni                OBS tarballs for Uyuni
#   task setup / gen / clean      Dev tooling
#

vars:
  DOCBUILD: "{{.ROOT_DIR}}/.bin/docbuild"
  PDF_THEMES_DIR: "{{.ROOT_DIR}}/branding/pdf/themes"
  PDF_FONTS_DIR: "{{.ROOT_DIR}}/branding/pdf/fonts"
  XREF_EXT: "{{.ROOT_DIR}}/.bin/xref-converter.rb"
  REVDATE:
    sh: date +'%B %d, %Y'
  CONTAINER_CMD:
    sh: which podman 2>/dev/null || which docker 2>/dev/null || echo "podman"
  BUILDER_IMAGE: "ghcr.io/uyuni-project/uyuni-docs-api-builder:latest"

tasks:

  # --------------------------------------------------------------------------
  # Default — human-friendly help screen (runs when you type just: task)
  # --------------------------------------------------------------------------
  default:
    silent: true
    cmds:
      - |
        echo ""
        echo "  uyuni-docs-api — build tasks"
        echo ""
        echo "  ── CONTAINER (recommended — requires only Podman or Docker) ──────────────"
        echo "  container:publish:mlm   Full MLM build — HTML + API PDF"
        echo "  container:publish:uyuni Full Uyuni build — HTML + API PDF"
        echo "  container:pdf:mlm       MLM API PDF only"
        echo "  container:pdf:uyuni     Uyuni API PDF only"
        echo "  container:obs:mlm       OBS source tarballs for MLM"
        echo "  container:obs:uyuni     OBS source tarballs for Uyuni"
        echo ""
        echo "  ── PREVIEW / DRAFT HTML (fast, no PDF) ──────────────────────────────────"
        echo "  container:draft:mlm     MLM HTML preview — documentation.suse.com branding"
        echo "  container:draft:uyuni   Uyuni HTML preview — uyuni-project.org branding"
        echo "  draft:mlm               (local) MLM HTML preview"
        echo "  draft:uyuni             (local) Uyuni HTML preview"
        echo ""
        echo "  ── LOCAL (Go + Task + Antora + asciidoctor-pdf installed) ───────────────"
        echo "  publish:mlm             Full MLM build — HTML + API PDF"
        echo "  publish:uyuni           Full Uyuni build — HTML + API PDF"
        echo "  pdf:mlm                 MLM API PDF only"
        echo "  pdf:uyuni               Uyuni API PDF only"
        echo "  obs:mlm                 OBS source tarballs for MLM"
        echo "  obs:uyuni               OBS source tarballs for Uyuni"
        echo ""
        echo "  ── DEV / TOOLING ────────────────────────────────────────────────────────"
        echo "  setup                   Build the Go toolchain binary (.bin/docbuild)"
        echo "  gen                     Regenerate nav-api-guide.adoc and Antora/PDF configs"
        echo "  clean                   Remove build/, translations/, .cache/, .bin/"
        echo "  container:build         Build the builder image locally from Dockerfile.bci"
        echo "  container:pull          Pull the latest pre-built builder image from GHCR"
        echo "  container:check-update  Check whether a newer builder image is available"
        echo "  container:shell         Open an interactive shell inside the container"
        echo ""
        echo "  Run 'task --list' for the full index | 'task --summary <task>' for details"
        echo ""

  # --------------------------------------------------------------------------
  # Setup — build the Go binary
  # --------------------------------------------------------------------------
  setup:
    desc: "[Dev] Build the Go toolchain binary (.bin/docbuild)"
    cmds:
      - mkdir -p .bin
      - go build -buildvcs=false -o {{.DOCBUILD}} ./cmd/docbuild/
    sources:
      - cmd/docbuild/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.DOCBUILD}}"

  # --------------------------------------------------------------------------
  # Config generation
  # --------------------------------------------------------------------------
  gen:
    desc: "[Dev] Regenerate nav-api-guide.adoc and all Antora/PDF configs from config.yml"
    deps: [setup]
    cmds:
      - "{{.DOCBUILD}} gen-nav"
      - "{{.DOCBUILD}} gen-all"
    sources:
      - config.yml
      - modules/api/pages/apilist.adoc

  # --------------------------------------------------------------------------
  # HTML draft / preview builds
  # --------------------------------------------------------------------------
  draft:mlm:
    desc: "[Draft] MLM HTML preview — documentation.suse.com branding (no PDF)"
    deps: [gen]
    cmds:
      - DOCSEARCH_ENABLED=true SITE_SEARCH_PROVIDER=lunr npx antora --extension @antora/lunr-extension translations/en/mlm-dsc.site.yml

  draft:uyuni:
    desc: "[Draft] Uyuni HTML preview — uyuni-project.org branding (no PDF)"
    deps: [gen]
    cmds:
      - DOCSEARCH_ENABLED=true SITE_SEARCH_PROVIDER=lunr npx antora --extension @antora/lunr-extension translations/en/uyuni-website.site.yml

  draft:all:
    desc: "[Draft] Both HTML previews (sequential)"
    cmds:
      - task: draft:mlm
      - task: draft:uyuni

  # --------------------------------------------------------------------------
  # PDF builds
  # --------------------------------------------------------------------------
  pdf:mlm:
    desc: "[Local] Build SUSE Multi-Linux Manager API PDF"
    deps: [gen]
    cmds:
      - mkdir -p build/en/pdf
      - "{{.DOCBUILD}} gen-pdf-nav -book api -lang en -dir modules/api"
      - |
        asciidoctor-pdf \
          -r {{.XREF_EXT}} \
          -a pdf-themesdir={{.PDF_THEMES_DIR}}/ \
          -a pdf-theme=suse \
          -a pdf-fontsdir={{.PDF_FONTS_DIR}} \
          -a productname='SUSE Multi-Linux Manager' \
          -a productnumber='5.2' \
          -a mlm-content=true \
          -a revdate="{{.REVDATE}}" \
          --base-dir . \
          --out-file build/en/pdf/suse_multi_linux_manager_api_guide.pdf \
          modules/api/nav-api-guide.pdf.en.adoc

  pdf:uyuni:
    desc: "[Local] Build Uyuni API PDF"
    deps: [gen]
    cmds:
      - mkdir -p build/en/pdf
      - "{{.DOCBUILD}} gen-pdf-nav -book api -lang en -dir modules/api"
      - |
        asciidoctor-pdf \
          -r {{.XREF_EXT}} \
          -a pdf-themesdir={{.PDF_THEMES_DIR}}/ \
          -a pdf-theme=uyuni \
          -a pdf-fontsdir={{.PDF_FONTS_DIR}} \
          -a productname='Uyuni' \
          -a productnumber='2026.06' \
          -a uyuni-content=true \
          -a revdate="{{.REVDATE}}" \
          --base-dir . \
          --out-file build/en/pdf/uyuni_api_guide.pdf \
          modules/api/nav-api-guide.pdf.en.adoc

  pdf:all:
    desc: "[Local] Build all PDFs — both products"
    deps: [pdf:mlm, pdf:uyuni]

  # --------------------------------------------------------------------------
  # Publish — full production build (HTML + PDF)
  # --------------------------------------------------------------------------
  publish:mlm:
    desc: "[Local] Full MLM build — HTML + API PDF"
    deps: [draft:mlm, pdf:mlm]

  publish:uyuni:
    desc: "[Local] Full Uyuni build — HTML + API PDF"
    deps: [draft:uyuni, pdf:uyuni]

  publish:all:
    desc: "[Local] Full build — both products, HTML + PDF"
    deps: [publish:mlm, publish:uyuni]

  # --------------------------------------------------------------------------
  # OBS packages
  # --------------------------------------------------------------------------
  obs:mlm:
    desc: "[Local] Create OBS tarballs for MLM (HTML + PDF)"
    deps: [publish:mlm]
    cmds:
      - mkdir -p build/packages
      - tar --exclude='build/en/pdf' -czvf build/packages/susemanager-api-docs_en.tar.gz build/en
      - tar -czvf build/packages/susemanager-api-docs_en-pdf.tar.gz build/en/pdf

  obs:uyuni:
    desc: "[Local] Create OBS tarballs for Uyuni (HTML + PDF)"
    deps: [publish:uyuni]
    cmds:
      - mkdir -p build/packages
      - tar --exclude='build/en/pdf' -czvf build/packages/uyuni-api-docs_en.tar.gz build/en
      - tar -czvf build/packages/uyuni-api-docs_en-pdf.tar.gz build/en/pdf

  # --------------------------------------------------------------------------
  # Validation (available via --list or --summary, not shown in default help)
  # --------------------------------------------------------------------------
  validate:mlm:
    desc: "[Dev] Antora xref validation — MLM"
    deps: [gen]
    cmds:
      - NODE_PATH="$(npm -g root)" antora --generator @antora/xref-validator translations/en/mlm-dsc.site.yml

  validate:uyuni:
    desc: "[Dev] Antora xref validation — Uyuni"
    deps: [gen]
    cmds:
      - NODE_PATH="$(npm -g root)" antora --generator @antora/xref-validator translations/en/uyuni-website.site.yml

  # --------------------------------------------------------------------------
  # Clean
  # --------------------------------------------------------------------------
  clean:
    desc: "[Dev] Remove build artifacts, generated configs, and Antora cache"
    cmds:
      - rm -rf build/ translations/ .cache/ .bin/
      - rm -f modules/api/nav-api-guide.pdf.en.adoc
      - echo "Clean complete."

  # --------------------------------------------------------------------------
  # Container — build / pull / check
  # --------------------------------------------------------------------------
  container:build:
    desc: "[Dev] Build the uyuni-docs-api-builder image locally from Dockerfile.bci"
    cmds:
      - "{{.CONTAINER_CMD}} build -f Dockerfile.bci -t {{.BUILDER_IMAGE}} ."

  container:pull:
    desc: "[Container] Pull the latest pre-built builder image from GHCR"
    cmds:
      - "{{.CONTAINER_CMD}} pull {{.BUILDER_IMAGE}}"
      - "{{.CONTAINER_CMD}} tag {{.BUILDER_IMAGE}} uyuni-docs-api-builder:latest"
      - 'echo "uyuni-docs-api-builder:latest is now up to date."'

  container:check-update:
    desc: "[Dev] Check whether a newer builder image is available on GHCR"
    silent: true
    cmds:
      - |
        if ! command -v skopeo >/dev/null 2>&1; then
          printf '\n  NOTE: skopeo is not installed — cannot check without pulling.\n'
          printf '  To update your local image run: task container:pull\n\n'
          exit 0
        fi
        REMOTE=$(skopeo inspect --no-creds docker://{{.BUILDER_IMAGE}} 2>/dev/null | grep -m1 '"Digest"' | awk -F'"' '{print $4}')
        LOCAL=$({{.CONTAINER_CMD}} image inspect uyuni-docs-api-builder:latest 2>/dev/null | grep -m1 '"Digest"' | awk -F'"' '{print $4}')
        if [ -z "$REMOTE" ]; then
          printf '\n  WARNING: Could not reach ghcr.io — skipping update check.\n\n'
        elif [ -z "$LOCAL" ]; then
          printf '\n  No local image found. Run: task container:pull\n\n'
        elif [ "$LOCAL" = "$REMOTE" ]; then
          printf '  uyuni-docs-api-builder is up to date.\n'
        else
          printf '\n'
          printf '  +--------------------------------------------------------------+\n'
          printf '  | A new uyuni-docs-api-builder image is available on GHCR.    |\n'
          printf '  | Run: task container:pull                                     |\n'
          printf '  +--------------------------------------------------------------+\n'
          printf '\n'
        fi

  container:shell:
    desc: "[Dev] Open an interactive shell inside the builder container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -it -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} bash"

  container:run:
    desc: "[Container] Run any task inside the container (escape hatch: task container:run -- <task>)"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task {{.CLI_ARGS}}"

  # --------------------------------------------------------------------------
  # Container — full production builds (HTML + PDF)
  # --------------------------------------------------------------------------
  container:publish:mlm:
    desc: "[Container] Full MLM build — HTML + API PDF, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task publish:mlm"

  container:publish:uyuni:
    desc: "[Container] Full Uyuni build — HTML + API PDF, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task publish:uyuni"

  container:publish:all:
    desc: "[Container] Full build — both products, HTML + PDF, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task publish:all"

  # --------------------------------------------------------------------------
  # Container — HTML draft / preview
  # --------------------------------------------------------------------------
  container:draft:mlm:
    desc: "[Draft] MLM HTML preview — documentation.suse.com branding, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task draft:mlm"

  container:draft:uyuni:
    desc: "[Draft] Uyuni HTML preview — uyuni-project.org branding, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task draft:uyuni"

  container:draft:all:
    desc: "[Draft] Both HTML previews, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task draft:all"

  # --------------------------------------------------------------------------
  # Container — PDF only
  # --------------------------------------------------------------------------
  container:pdf:mlm:
    desc: "[Container] MLM API PDF only, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task pdf:mlm"

  container:pdf:uyuni:
    desc: "[Container] Uyuni API PDF only, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task pdf:uyuni"

  container:pdf:all:
    desc: "[Container] All PDFs — both products, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task pdf:all"

  # --------------------------------------------------------------------------
  # Container — OBS packages
  # --------------------------------------------------------------------------
  container:obs:mlm:
    desc: "[Container] OBS tarballs for MLM, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task obs:mlm"

  container:obs:uyuni:
    desc: "[Container] OBS tarballs for Uyuni, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task obs:uyuni"

  # --------------------------------------------------------------------------
  # Container — Dev
  # --------------------------------------------------------------------------
  container:setup:
    desc: "[Dev] Build docbuild binary inside the container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task setup"

  container:gen:
    desc: "[Dev] Generate all configs inside the container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task gen"

  container:validate:mlm:
    desc: "[Dev] Antora xref validation — MLM, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task validate:mlm"

  container:validate:uyuni:
    desc: "[Dev] Antora xref validation — Uyuni, via container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task validate:uyuni"

  container:clean:
    desc: "[Dev] Clean build artifacts inside the container"
    cmds:
      - "{{.CONTAINER_CMD}} run --rm -v {{.ROOT_DIR}}:/docs:Z -w /docs {{.BUILDER_IMAGE}} task clean"
